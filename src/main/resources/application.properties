#PROPERTIES
#Propiedad para persistir la informacion de SESSION en la base de datos (requiere 2 tablas de SESSION)
#spring.session.store-type=jdbc  
# MVC config.
spring.mvc.view.prefix= /jsp/
spring.mvc.view.suffix= .jsp

spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.data.jpa.repositories.enabled=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
#Propiedad para realizar las consultas a trav\u00c3\u00a9s de Hibernate con los nombres estrictamente de las tablas.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#Propiedad para que el nombre de las columnas aparezca quoted
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
